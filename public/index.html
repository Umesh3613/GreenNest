<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenNest</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <header>
        <h1>🌱 GreenNest</h1>
        <nav>
            <a href="#" class="tab-link active" data-tab="home">Home</a>
            <a href="#" class="tab-link" data-tab="products">Plants</a>
            <a href="#" class="tab-link" data-tab="services">Services</a>
            <a href="#" class="tab-link" data-tab="booking">Book Gardener</a>
            <a href="#" class="tab-link" data-tab="myBookings">My Bookings</a>
        </nav>
    </header>

    <section class="tab-body">
        <!-- HOME -->
        <section id="home" class="tab-content active">
            <h2>Welcome to GreenNest</h2>
            <p>Your one-stop solution for plants and gardening services</p>
            <div class="hero-actions">
                <a href="#" class="tab-link hero-button hero-button-primary" data-tab="products">Explore Plants</a>
                <a href="#" class="tab-link hero-button hero-button-secondary" data-tab="services">Explore Services</a>
            </div>
        </section>

        <!-- PRODUCTS -->
        <section id="products" class="tab-content">
            <h2>🌿 Our Plants</h2>
            <div class="product-container"></div>
        </section>

        <!-- SERVICES -->
        <section id="services" class="tab-content">
            <h2>🌼 Gardening Services</h2>

            <div class="service-container"></div>
        </section>

        <!-- BOOKING -->
        <section id="booking" class="tab-content">
            <h2>📅 Book a Gardener</h2>

            <form id="bookingForm">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="text" id="service" placeholder="Service Type" required>
                <input type="date" id="date" required>
                <input type="text" id="address" placeholder="Address" required>
                <button type="submit" id="bookBtn" class="disabled" disabled>Book Now</button>
            </form>
        </section>

        <!-- MY BOOKINGS -->
        <section id="myBookings" class="tab-content">
            <h2>📅 My Bookings</h2>
            <div class="bookings-container"></div>
        </section>
    </section>

    <footer>
        <p>© 2026 GreenNest | All Rights Reserved</p>
    </footer>

    <script src="./script.js"></script>

</body>

</html>
